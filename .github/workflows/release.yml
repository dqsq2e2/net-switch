name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish single-file application
        shell: pwsh
        run: |
          dotnet publish .\NetSwitch.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:DebugType=None `
            --output .\artifacts\publish

      - name: Publish Lite application
        shell: pwsh
        run: |
          dotnet publish .\NetSwitch.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:DebugType=None `
            -p:AssemblyName=Net-Switch-Lite `
            --output .\artifacts\lite
          Copy-Item ".\artifacts\lite\Net-Switch-Lite.exe" ".\artifacts\Net-Switch-Lite.exe"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "1.0.0" }
          $env:APP_VERSION = $version
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" .\installer.iss
          Copy-Item ".\artifacts\publish\Net Switch.exe" ".\artifacts\Net-Switch.exe"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: net-switch-windows-x64
          path: |
            artifacts/Net-Switch.exe
            artifacts/Net-Switch-Lite.exe
            artifacts/installer/Net-Switch-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/Net-Switch.exe
            artifacts/Net-Switch-Lite.exe
            artifacts/installer/Net-Switch-Setup.exe
